name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        # --ignore-scripts so the root postinstall (`prisma generate &&
        # prisma db push`) doesn't try to reach a database CI can't
        # provision. `prisma generate` is invoked explicitly below.
        run: npm ci --ignore-scripts

      - name: Generate Prisma Client
        run: npx prisma generate

      # Procurement vertical: scoped gates while src/server tech-debt is
      # tracked in a follow-up issue. See tsconfig.procurement.json.
      - name: Type check (procurement scope)
        run: npx tsc -p tsconfig.procurement.json

      - name: Test (procurement)
        run: npm run test:procurement

      # Production build is validated by Vercel's preview deploy. The
      # repo's `npm run build` runs `prisma db push` against a live DB,
      # which CI doesn't provision; tracked alongside src/server tech
      # debt in #16.
