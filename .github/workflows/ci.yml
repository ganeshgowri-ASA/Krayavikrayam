name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      # Procurement vertical: scoped gates while src/server tech-debt is
      # tracked in a follow-up issue. See tsconfig.procurement.json.
      - name: Type check (procurement scope)
        run: npx tsc -p tsconfig.procurement.json

      - name: Test (procurement)
        run: npm run test:procurement

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          RESEND_API_KEY: re_placeholder
          NEXT_PUBLIC_SENTRY_DSN: ""
